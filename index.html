<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>JINN DIARY</title>
    <meta name="theme-color" content="#f8a86c" />
    <meta name="apple-mobile-web-app-title" content="JINN DIARY" />
    <link rel="apple-touch-icon" href="assets/JINN-thumbnail.jpg" />
    <link rel="icon" href="assets/JINN-thumbnail.jpg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css?v=20260605-2" />
  </head>
  <body>
    <div class="sync-badge sync-status">Local only</div>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">JINN DIARY</p>
          <h1>Baby activity log</h1>
        </div>
      </header>

      <nav class="tabs" aria-label="Views">
        <button class="tab is-active" type="button" data-view-button="memo" aria-label="Memo">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4 10.8 12 4l8 6.8V20a1 1 0 0 1-1 1h-5.2v-6.4H10.2V21H5a1 1 0 0 1-1-1v-9.2Z" />
          </svg>
          <span>Memo</span>
        </button>
        <button class="tab" type="button" data-view-button="summary" aria-label="Summary">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4.5 19.5h15M6.2 16.5v-4.8M12 16.5V7.2M17.8 16.5v-7" />
            <circle cx="6.2" cy="10" r="1.5" />
            <circle cx="12" cy="5.5" r="1.5" />
            <circle cx="17.8" cy="7.8" r="1.5" />
          </svg>
          <span>Summary</span>
        </button>
        <button class="tab" type="button" data-view-button="settings" aria-label="Sheet">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 4.5h9l3 3v12H6v-15Z" />
            <path d="M9 11h6M9 14h6M9 17h3" />
          </svg>
          <span>Sheet</span>
        </button>
      </nav>

      <section class="view is-active" id="memoView" data-view="memo">
        <form class="entry-panel" id="entryForm">
          <label class="span-2">
            <span>Activity</span>
            <select id="activityType" required>
              <option value="breast">Breast</option>
              <option value="pump">Pump</option>
              <option value="feed" selected>Feed</option>
              <option value="weight">Weight</option>
              <option value="height">Height</option>
              <option value="diaper">Diaper</option>
              <option value="sleep">Sleep</option>
              <option value="note">Note</option>
            </select>
          </label>

          <label class="span-2">
            <span>Date and time</span>
            <div class="datetime-row">
              <input id="happenedAt" type="datetime-local" required />
              <button class="secondary compact-time" id="minusTenButton" type="button">-10m</button>
              <button class="secondary compact-now" id="nowButton" type="button">Now</button>
            </div>
          </label>

          <label>
            <span>Amount</span>
            <input id="amount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="Optional" />
          </label>

          <label>
            <span>Unit</span>
            <select id="unit">
              <option value="">None</option>
              <option value="oz">oz</option>
              <option value="ml">ml</option>
              <option value="kg">kg</option>
              <option value="cm">cm</option>
              <option value="min">min</option>
            </select>
          </label>

          <label class="span-4">
            <span>Note</span>
            <input id="note" type="text" placeholder="Side, bottle, mood, or anything useful" />
          </label>

          <div class="form-actions span-4">
            <button type="submit">Save</button>
            <button class="secondary" id="sampleButton" type="button">Load sample day</button>
          </div>
        </form>

        <section class="log-panel">
          <div class="section-header">
            <div class="section-title">
              <h2>Today</h2>
              <p id="todayLabel">No entries yet</p>
            </div>
            <div class="section-actions">
              <button id="syncMainButton" type="button">Resync</button>
              <button class="danger" id="clearLocalButton" type="button">Clear local</button>
            </div>
          </div>
          <div class="timeline" id="todayTimeline"></div>
        </section>
      </section>

      <section class="view" id="summaryView" data-view="summary">
        <div class="section-header">
          <div>
            <h2>Daily summary</h2>
            <p>Totals and timeline grouped by day.</p>
          </div>
          <button id="refreshButton" type="button">Resync</button>
        </div>
        <details class="chart-panel" open>
          <summary>Chart (30d)</summary>
          <div class="chart-controls" aria-label="Chart metric">
            <button class="chart-toggle is-active" type="button" data-chart-type="feed">Feed</button>
            <button class="chart-toggle" type="button" data-chart-type="pump">Pump</button>
            <button class="chart-toggle" type="button" data-chart-type="weight">Weight</button>
            <button class="chart-toggle" type="button" data-chart-type="height">Height</button>
          </div>
          <div class="bar-chart" id="summaryChart"></div>
        </details>
        <div class="day-grid" id="dayGrid"></div>
      </section>

      <section class="view" id="settingsView" data-view="settings">
        <section class="settings-panel">
          <div class="section-header">
            <div>
              <h2>Spreadsheet database</h2>
              <p>Paste your Google Apps Script web app URL to sync this GitHub Pages app with Google Sheets.</p>
            </div>
          </div>

          <label>
            <span>Apps Script web app URL</span>
            <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
            <small class="field-help">Use the /exec URL from Deploy > Manage deployments, not the googleusercontent.com/macros/echo URL.</small>
          </label>

          <div class="form-actions">
            <button id="saveSettingsButton" type="button">Save URL</button>
            <button class="secondary" id="syncButton" type="button">Sync now</button>
          </div>

          <details>
            <summary>Google Apps Script code</summary>
            <pre><code id="scriptSnippet"></code></pre>
          </details>
        </section>
      </section>
    </main>

    <template id="timelineItemTemplate">
      <article class="timeline-item">
        <div class="time"></div>
        <div>
          <div class="activity-line">
            <strong></strong>
            <span></span>
          </div>
          <p></p>
        </div>
        <button class="icon danger" type="button" aria-label="Delete activity">x</button>
      </article>
    </template>

    <script src="app.js?v=20260605-2"></script>
  </body>
</html>
